<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务场景模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #262626;
    height: 100vh;
    overflow: hidden;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    background: #fff;
    padding: 12px 24px;
    border-bottom: 1px solid #e8e8e8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h1 { font-size: 18px; font-weight: 600; }

.header-info { display: flex; gap: 16px; align-items: center; font-size: 13px; color: #8c8c8c; }

.btn {
    padding: 6px 16px;
    background: #1890ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}

.btn:hover { background: #40a9ff; }
.btn:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; }

.main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.sidebar {
    width: 240px;
    background: #001529;
    color: #fff;
    overflow-y: auto;
    flex-shrink: 0;
}

.biz-line { border-bottom: 1px solid #ffffff1a; }

.biz-line-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
}

.biz-line-header:hover { background: #ffffff0d; }
.biz-line-header:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.biz-line-header .arrow { transition: transform 0.2s; font-size: 12px; }
.biz-line-header.expanded .arrow { transform: rotate(90deg); }

.process-list { display: none; }
.process-list.show { display: block; }

.process-item {
    padding: 8px 16px 8px 32px;
    cursor: pointer;
    font-size: 13px;
    color: #ffffffbf;
}

.process-item:hover { background: #ffffff0d; color: #fff; }
.process-item.active { background: #1890ff; color: #fff; }
.process-item:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f5f7fa;
}

.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 0 16px;
}

.tab-btn {
    padding: 12px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: #8c8c8c;
    border-bottom: 2px solid transparent;
}

.tab-btn:hover { color: #1890ff; }
.tab-btn.active { color: #1890ff; border-bottom-color: #1890ff; }
.tab-btn:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.tab-content { flex: 1; overflow-y: auto; padding: 16px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.card h3 { font-size: 15px; margin-bottom: 12px; color: #262626; }
.card p { font-size: 13px; line-height: 1.6; color: #595959; }

.card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.card th, .card td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #e8e8e8;
}

.card th { background: #fafafa; font-weight: 600; color: #262626; }
.card td { color: #595959; }

.code-block {
    position: relative;
    background: #f6f8fa;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
}

.copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.copy-btn:hover { border-color: #1890ff; color: #1890ff; }

.data-table-wrap {
    max-height: 400px;
    overflow: auto;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
}

.footer {
    background: #fff;
    padding: 8px 24px;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #8c8c8c;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mermaid { display: flex; justify-content: center; padding: 16px 0; }

.pk-badge {
    display: inline-block;
    padding: 1px 6px;
    background: #fff7e6;
    color: #fa8c16;
    border-radius: 3px;
    font-size: 11px;
    margin-left: 4px;
}

.type-tag {
    display: inline-block;
    padding: 1px 6px;
    background: #f0f5ff;
    color: #2f54eb;
    border-radius: 3px;
    font-size: 11px;
    font-family: monospace;
}
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>📊 业务场景模拟器</h1>
            <div class="header-info">
                <span id="industry-display"></span>
                <span id="depth-display"></span>
                <span id="time-display"></span>
                <button id="export-btn" class="btn">导出 HTML</button>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar">
                <nav id="biz-nav"></nav>
            </aside>
            <main class="content">
                <div class="tabs" role="tablist">
                    <button id="tab-btn-process" class="tab-btn active" type="button" role="tab" aria-selected="true" data-tab="process">业务流程</button>
                    <button id="tab-btn-schema" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="schema">表结构</button>
                    <button id="tab-btn-data" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="data">模拟数据</button>
                    <button id="tab-btn-er" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="er">ER图</button>
                </div>
                <div class="tab-content">
                    <div id="tab-process" class="tab-pane active" role="tabpanel" aria-labelledby="tab-btn-process"></div>
                    <div id="tab-schema" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-schema"></div>
                    <div id="tab-data" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-data"></div>
                    <div id="tab-er" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-er"></div>
                </div>
            </main>
        </div>
        <footer class="footer">
            <span id="stats"></span>
        </footer>
    </div>

    <script>
        // 业务数据注入点 - Skill 执行时替换
        const BIZ_DATA = {"industry":"电商","depth":2,"generateTime":"2026-05-08 14:30:00","businessLines":[{"name":"商品管理","description":"商品的全生命周期管理","processes":[{"name":"商品录入","description":"商家提交商品信息，平台审核后上架","flowchart":"graph LR\nA[商家提交] --> B{平台审核}\nB -->|通过| C[上架]\nB -->|驳回| D[修改]","tables":["dim_product","dwd_product_audit"]}],"tables":[{"name":"dim_product","comment":"商品维度表","columns":[{"name":"product_id","type":"BIGINT","comment":"商品ID","isPk":true},{"name":"product_name","type":"VARCHAR(256)","comment":"商品名称"},{"name":"category_id","type":"BIGINT","comment":"类目ID"},{"name":"price","type":"DECIMAL(10,2)","comment":"售价"},{"name":"status","type":"TINYINT","comment":"状态 0下架 1上架"}],"ddl":"CREATE TABLE dim_product (\n  product_id BIGINT COMMENT '商品ID',\n  product_name VARCHAR(256) COMMENT '商品名称',\n  category_id BIGINT COMMENT '类目ID',\n  price DECIMAL(10,2) COMMENT '售价',\n  status TINYINT COMMENT '状态 0下架 1上架'\n) COMMENT '商品维度表';","data":[{"product_id":1001,"product_name":"iPhone 15","category_id":101,"price":5999.00,"status":1},{"product_id":1002,"product_name":"MacBook Pro","category_id":102,"price":12999.00,"status":1},{"product_id":1003,"product_name":"AirPods Pro","category_id":103,"price":1999.00,"status":0}]},{"name":"dwd_product_audit","comment":"商品审核事实表","columns":[{"name":"audit_id","type":"BIGINT","comment":"审核ID","isPk":true},{"name":"product_id","type":"BIGINT","comment":"商品ID"},{"name":"auditor","type":"VARCHAR(64)","comment":"审核人"},{"name":"audit_time","type":"DATETIME","comment":"审核时间"},{"name":"result","type":"TINYINT","comment":"结果 0驳回 1通过"}],"ddl":"CREATE TABLE dwd_product_audit (\n  audit_id BIGINT COMMENT '审核ID',\n  product_id BIGINT COMMENT '商品ID',\n  auditor VARCHAR(64) COMMENT '审核人',\n  audit_time DATETIME COMMENT '审核时间',\n  result TINYINT COMMENT '结果 0驳回 1通过'\n) COMMENT '商品审核事实表';","data":[{"audit_id":1,"product_id":1001,"auditor":"张三","audit_time":"2026-05-01 10:00:00","result":1},{"audit_id":2,"product_id":1002,"auditor":"李四","audit_time":"2026-05-01 11:00:00","result":1},{"audit_id":3,"product_id":1003,"auditor":"张三","audit_time":"2026-05-02 09:00:00","result":0}]}],"relations":[{"from":"dim_product","to":"dwd_product_audit","type":"1:N","field":"product_id"}]},{"name":"订单交易","description":"订单的全流程管理","processes":[{"name":"下单","description":"用户选择商品提交订单","flowchart":"graph LR\nA[购物车] --> B[确认订单]\nB --> C[提交订单]\nC --> D[待支付]","tables":["dwd_order","dwd_order_item"]}],"tables":[{"name":"dwd_order","comment":"订单事实表","columns":[{"name":"order_id","type":"BIGINT","comment":"订单ID","isPk":true},{"name":"user_id","type":"BIGINT","comment":"用户ID"},{"name":"total_amount","type":"DECIMAL(10,2)","comment":"订单总额"},{"name":"status","type":"TINYINT","comment":"状态 0待支付 1已支付 2已取消"},{"name":"create_time","type":"DATETIME","comment":"创建时间"}],"ddl":"CREATE TABLE dwd_order (\n  order_id BIGINT COMMENT '订单ID',\n  user_id BIGINT COMMENT '用户ID',\n  total_amount DECIMAL(10,2) COMMENT '订单总额',\n  status TINYINT COMMENT '状态',\n  create_time DATETIME COMMENT '创建时间'\n) COMMENT '订单事实表';","data":[{"order_id":5001,"user_id":100,"total_amount":5999.00,"status":1,"create_time":"2026-05-01 12:00:00"},{"order_id":5002,"user_id":101,"total_amount":14998.00,"status":1,"create_time":"2026-05-02 15:00:00"}]},{"name":"dwd_order_item","comment":"订单明细表","columns":[{"name":"item_id","type":"BIGINT","comment":"明细ID","isPk":true},{"name":"order_id","type":"BIGINT","comment":"订单ID"},{"name":"product_id","type":"BIGINT","comment":"商品ID"},{"name":"quantity","type":"INT","comment":"数量"},{"name":"price","type":"DECIMAL(10,2)","comment":"单价"}],"ddl":"CREATE TABLE dwd_order_item (\n  item_id BIGINT COMMENT '明细ID',\n  order_id BIGINT COMMENT '订单ID',\n  product_id BIGINT COMMENT '商品ID',\n  quantity INT COMMENT '数量',\n  price DECIMAL(10,2) COMMENT '单价'\n) COMMENT '订单明细表';","data":[{"item_id":1,"order_id":5001,"product_id":1001,"quantity":1,"price":5999.00},{"item_id":2,"order_id":5002,"product_id":1002,"quantity":1,"price":12999.00},{"item_id":3,"order_id":5002,"product_id":1003,"quantity":1,"price":1999.00}]}],"relations":[{"from":"dwd_order","to":"dwd_order_item","type":"1:N","field":"order_id"}]}]};
    </script>
    <script>
(function() {
    'use strict';

    let currentBizLine = 0;
    let currentProcess = 0;

    function init() {
        renderHeader();
        renderSidebar();
        renderTabs();
        selectBizLine(0, 0);
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
    }

    function renderHeader() {
        document.getElementById('industry-display').textContent = '行业：' + BIZ_DATA.industry;
        const depthLabels = { 1: '轻量级', 2: '中等', default: '深度建模' };
        document.getElementById('depth-display').textContent = '深度：' + (depthLabels[BIZ_DATA.depth] || depthLabels.default) + '(' + BIZ_DATA.depth + ')';
        document.getElementById('time-display').textContent = '生成：' + BIZ_DATA.generateTime;
    }

    function renderSidebar() {
        const nav = document.getElementById('biz-nav');
        let html = '';
        BIZ_DATA.businessLines.forEach((line, i) => {
            html += '<div class="biz-line">';
            html += '<div class="biz-line-header" onclick="toggleBizLine(' + i + ')">';
            html += '<span>' + line.name + '</span><span class="arrow">▶</span>';
            html += '</div>';
            html += '<div class="process-list" id="processes-' + i + '">';
            line.processes.forEach((proc, j) => {
                html += '<div class="process-item" id="proc-' + i + '-' + j + '" onclick="selectProcess(' + i + ',' + j + ')">' + proc.name + '</div>';
            });
            html += '</div></div>';
        });
        nav.innerHTML = html;
    }

    function toggleBizLine(index) {
        const list = document.getElementById('processes-' + index);
        const header = list.previousElementSibling;
        list.classList.toggle('show');
        header.classList.toggle('expanded');
    }

    function selectBizLine(bizIndex, procIndex) {
        currentBizLine = bizIndex;
        currentProcess = procIndex;
        document.querySelectorAll('.process-item').forEach(el => el.classList.remove('active'));
        const el = document.getElementById('proc-' + bizIndex + '-' + procIndex);
        if (el) el.classList.add('active');
        const line = BIZ_DATA.businessLines[bizIndex];
        const proc = line.processes[procIndex];
        renderProcessTab(proc);
        renderSchemaTab(line, proc);
        renderDataTab(line, proc);
        renderERTab();
    }

    function selectProcess(bizIndex, procIndex) {
        selectBizLine(bizIndex, procIndex);
    }

    function renderTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });
    }

    function renderProcessTab(proc) {
        const container = document.getElementById('tab-process');
        let html = '<div class="card"><h3>' + proc.name + '</h3>';
        html += '<p>' + proc.description + '</p></div>';
        if (proc.flowchart) {
            html += '<div class="card"><h3>流程图</h3>';
            html += '<div class="mermaid">' + proc.flowchart + '</div></div>';
        }
        html += '<div class="card"><h3>涉及数据表</h3><ul>';
        proc.tables.forEach(t => { html += '<li>' + t + '</li>'; });
        html += '</ul></div>';
        container.innerHTML = html;
        mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
    }

    function renderSchemaTab(line, proc) {
        const container = document.getElementById('tab-schema');
        let html = '';
        const tables = line.tables.filter(t => proc.tables.includes(t.name));
        tables.forEach(table => {
            html += '<div class="card"><h3>' + table.name + ' <span style="color:#8c8c8c;font-size:12px;font-weight:normal">' + table.comment + '</span></h3>';
            html += '<table><thead><tr><th>字段名</th><th>类型</th><th>说明</th></tr></thead><tbody>';
            table.columns.forEach(col => {
                html += '<tr><td>' + col.name;
                if (col.isPk) html += ' <span class="pk-badge">PK</span>';
                html += '</td><td><span class="type-tag">' + col.type + '</span></td>';
                html += '<td>' + col.comment + '</td></tr>';
            });
            html += '</tbody></table>';
            html += '<div style="margin-top:12px"><div class="code-block"><button class="copy-btn" onclick="copyDDL(this)">复制</button><pre><code class="language-sql">' + escapeHtml(table.ddl) + '</code></pre></div></div>';
            html += '</div>';
        });
        container.innerHTML = html;
        container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    function renderDataTab(line, proc) {
        const container = document.getElementById('tab-data');
        let html = '';
        const tables = line.tables.filter(t => proc.tables.includes(t.name));
        tables.forEach(table => {
            html += '<div class="card"><h3>' + table.name + ' - 模拟数据 (' + table.data.length + ' 条)</h3>';
            if (table.data.length > 0) {
                html += '<div class="data-table-wrap"><table><thead><tr>';
                table.columns.forEach(col => { html += '<th>' + col.name + '</th>'; });
                html += '</tr></thead><tbody>';
                table.data.forEach(row => {
                    html += '<tr>';
                    table.columns.forEach(col => { html += '<td>' + escapeHtml(String(row[col.name] ?? '')) + '</td>'; });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                html += '<div style="margin-top:12px"><div class="code-block"><button class="copySQL(this)">复制</button><pre><code class="language-sql">' + generateInserts(table) + '</code></pre></div></div>';
            }
            html += '</div>';
        });
        container.innerHTML = html;
        container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    function renderERTab() {
        const container = document.getElementById('tab-er');
        let erDiagram = 'erDiagram\n';
        BIZ_DATA.businessLines.forEach(line => {
            if (line.relations) {
                line.relations.forEach(rel => {
                    const connector = rel.type === '1:1' ? '||--||' : '||--o{';
                    erDiagram += '    ' + rel.from + ' ' + connector + ' ' + rel.to + ' : "' + rel.field + '"\n';
                });
            }
        });
        container.innerHTML = '<div class="card"><h3>ER 关系图</h3><div class="mermaid">' + erDiagram + '</div></div>';
        mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
        updateStats();
    }

    function updateStats() {
        let tableCount = 0;
        BIZ_DATA.businessLines.forEach(line => { tableCount += line.tables.length; });
        document.getElementById('stats').textContent =
            '📦 共 ' + BIZ_DATA.businessLines.length + ' 个业务线 · ' + tableCount + ' 张表 · 深度：' + BIZ_DATA.depth + ' · 生成时间：' + BIZ_DATA.generateTime;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function generateInserts(table) {
        if (!table.data || table.data.length === 0) return '-- 无数据';
        let sql = '';
        table.data.forEach(row => {
            const cols = table.columns.map(c => c.name).join(', ');
            const vals = table.columns.map(c => {
                const v = row[c.name];
                if (v === null || v === undefined) return 'NULL';
                if (typeof v === 'number') return v;
                return "'" + String(v).replace(/'/g, "''") + "'";
            }).join(', ');
            sql += 'INSERT INTO ' + table.name + ' (' + cols + ') VALUES (' + vals + ');\n';
        });
        return sql;
    }

    window.toggleBizLine = toggleBizLine;
    window.selectProcess = selectProcess;

    window.copyDDL = function(btn) {
        const code = btn.nextElementSibling.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制'; setTimeout(() => { btn.textContent = '复制'; }, 1500); });
    };

    window.copySQL = function(btn) {
        const code = btn.nextElementSibling.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制'; setTimeout(() => { btn.textContent = '复制'; }, 1500); });
    };

    document.getElementById('export-btn').addEventListener('click', function() {
        const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'biz-scenario-' + BIZ_DATA.industry + '-' + BIZ_DATA.depth + '.html';
        a.click();
        URL.revokeObjectURL(url);
    });

    init();
})();
    </script>
</body>
</html>
