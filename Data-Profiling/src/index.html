<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务场景模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #262626;
    height: 100vh;
    overflow: hidden;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    background: #fff;
    padding: 12px 24px;
    border-bottom: 1px solid #e8e8e8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.header h1 { font-size: 18px; font-weight: 600; }

.header-controls { display: flex; gap: 12px; align-items: center; }

.header-controls label { font-size: 13px; color: #595959; display: flex; align-items: center; gap: 6px; }

.header-controls input[type="text"] {
    padding: 6px 10px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    font-size: 13px;
    width: 140px;
}

.header-controls input[type="text"]:focus { border-color: #1890ff; outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }

.header-controls select {
    padding: 6px 10px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
}

.header-controls select:focus { border-color: #1890ff; outline: none; }

.header-info { display: flex; gap: 16px; align-items: center; font-size: 13px; color: #8c8c8c; }

.btn {
    padding: 6px 16px;
    background: #1890ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}

.btn:hover { background: #40a9ff; }
.btn:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; }
.btn:disabled { background: #d9d9d9; cursor: not-allowed; }

.main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.sidebar {
    width: 240px;
    background: #001529;
    color: #fff;
    overflow-y: auto;
    flex-shrink: 0;
}

.sidebar-actions { padding: 8px; border-bottom: 1px solid #ffffff1a; }

.sidebar-action-btn {
    width: 100%;
    padding: 6px 12px;
    background: transparent;
    color: #ffffffbf;
    border: 1px solid #ffffff33;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.sidebar-action-btn:hover { background: #ffffff0d; color: #fff; }

.biz-line { border-bottom: 1px solid #ffffff1a; }

.biz-line-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
}

.biz-line-header:hover { background: #ffffff0d; }

.biz-line-header .arrow { transition: transform 0.2s; font-size: 12px; }
.biz-line-header.expanded .arrow { transform: rotate(90deg); }

.process-list { display: none; }
.process-list.show { display: block; }

.process-item {
    padding: 8px 16px 8px 32px;
    cursor: pointer;
    font-size: 13px;
    color: #ffffffbf;
}

.process-item:hover { background: #ffffff0d; color: #fff; }
.process-item.active { background: #1890ff; color: #fff; }

.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f5f7fa;
}

.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 0 16px;
}

.tab-btn {
    padding: 12px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: #8c8c8c;
    border-bottom: 2px solid transparent;
}

.tab-btn:hover { color: #1890ff; }
.tab-btn.active { color: #1890ff; border-bottom-color: #1890ff; }

.tab-content { flex: 1; overflow-y: auto; padding: 16px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.card h3 { font-size: 15px; margin-bottom: 12px; color: #262626; }
.card p { font-size: 13px; line-height: 1.6; color: #595959; }

.card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.card th, .card td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #e8e8e8;
}

.card th { background: #fafafa; font-weight: 600; color: #262626; }
.card td { color: #595959; }

.code-block {
    position: relative;
    background: #f6f8fa;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
}

.copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.copy-btn:hover { border-color: #1890ff; color: #1890ff; }

.data-table-wrap {
    max-height: 400px;
    overflow: auto;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
}

.footer {
    background: #fff;
    padding: 8px 24px;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #8c8c8c;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mermaid { display: flex; justify-content: center; padding: 16px 0; }

.pk-badge {
    display: inline-block;
    padding: 1px 6px;
    background: #fff7e6;
    color: #fa8c16;
    border-radius: 3px;
    font-size: 11px;
    margin-left: 4px;
}

.type-tag {
    display: inline-block;
    padding: 1px 6px;
    background: #f0f5ff;
    color: #2f54eb;
    border-radius: 3px;
    font-size: 11px;
    font-family: monospace;
}

/* Loading State */
.loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.8);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
}

.loading-overlay.show { display: flex; }

.spinner {
    width: 40px; height: 40px;
    border: 3px solid #e8e8e8;
    border-top-color: #1890ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 14px; color: #595959; }

.loading-steps {
    font-size: 12px;
    color: #8c8c8c;
    text-align: center;
    max-width: 400px;
}

.loading-step {
    padding: 4px 0;
    opacity: 0.5;
    transition: opacity 0.3s;
}

.loading-step.active {
    opacity: 1;
    color: #1890ff;
    font-weight: 500;
}

.loading-step.done {
    opacity: 0.7;
    color: #52c41a;
}

/* Error State */
.error-msg {
    background: #fff2f0;
    border: 1px solid #ffccc7;
    border-radius: 6px;
    padding: 12px 16px;
    color: #cf1322;
    font-size: 13px;
    margin: 16px;
}

/* Empty State */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8c8c8c;
    font-size: 14px;
    gap: 8px;
}

.empty-state .icon { font-size: 48px; opacity: 0.3; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>📊 业务场景模拟器</h1>
            <div class="header-controls">
                <label>行业：<input type="text" id="industry-input" placeholder="如：电商、金融、医疗"></label>
                <label>深度：<select id="depth-select"><option value="1">1 - 轻量级</option><option value="2" selected>2 - 中等</option><option value="3">3 - 深度建模</option></select></label>
                <button id="generate-btn" class="btn">▶ 生成</button>
            </div>
            <div class="header-info" id="header-info" style="display:none;">
                <span id="industry-display"></span>
                <span id="depth-display"></span>
                <span id="time-display"></span>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-actions">
                    <button class="sidebar-action-btn" id="toggle-all-btn">全部展开</button>
                </div>
                <nav id="biz-nav"></nav>
            </aside>
            <main class="content">
                <div class="tabs" role="tablist">
                    <button id="tab-btn-process" class="tab-btn active" type="button" role="tab" aria-selected="true" data-tab="process">业务流程</button>
                    <button id="tab-btn-schema" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="schema">表结构</button>
                    <button id="tab-btn-data" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="data">模拟数据</button>
                    <button id="tab-btn-er" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="er">ER图</button>
                </div>
                <div class="tab-content">
                    <div id="tab-process" class="tab-pane active" role="tabpanel">
                        <div class="empty-state"><span class="icon"></span><span>输入行业名称，点击生成开始</span></div>
                    </div>
                    <div id="tab-schema" class="tab-pane" role="tabpanel">
                        <div class="empty-state"><span class="icon"></span><span>生成后查看表结构</span></div>
                    </div>
                    <div id="tab-data" class="tab-pane" role="tabpanel">
                        <div class="empty-state"><span class="icon">📦</span><span>生成后查看模拟数据</span></div>
                    </div>
                    <div id="tab-er" class="tab-pane" role="tabpanel">
                        <div class="empty-state"><span class="icon">🔗</span><span>生成后查看 ER 关系图</span></div>
                    </div>
                </div>
            </main>
        </div>
        <footer class="footer">
            <span id="stats"></span>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">正在生成业务场景数据...</div>
        <div class="loading-steps" id="loading-steps"></div>
    </div>

    <script>
(function() {
    'use strict';

    var currentBizLine = 0;
    var currentProcess = 0;
    var allExpanded = false;
    var BIZ_DATA = null;

    var API_CONFIG = {
        baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
        apiKey: ' ',
        model: ' '
    };

    function showLoading(text) {
        document.getElementById('loading-text').textContent = text || '正在生成业务场景数据...';
        document.getElementById('loading-overlay').classList.add('show');
    }

    function hideLoading() {
        document.getElementById('loading-overlay').classList.remove('show');
    }

    function showError(msg) {
        var container = document.getElementById('tab-process');
        container.innerHTML = '<div class="error-msg">❌ ' + escapeHtml(msg) + '</div>';
        hideLoading();
    }

    function generateSystemPrompt() {
        return '你是一个数据建模专家。请根据用户指定的行业和深度，生成业务场景模拟数据。\n\n' +
            '表命名规则：使用有业务意义的名称（如 product、order、student），禁止使用数仓分层前缀（dim_、dwd_、dws_ 等）。\n' +
            '字段命名：使用 snake_case。\n' +
            '字段完整性：即使深度=1，每张表也必须包含支撑业务流程的核心字段（主键、必要外键、关键业务属性、状态/时间等审计字段），不可只给2-3个字段。深度增加时逐步补充扩展字段。\n' +
            '关系类型：relations 中的 type 必须为 "1:1"、"1:N"、"N:1" 或 "M:N" 之一。\n' +
            '只返回纯 JSON，不要包含任何其他文字或 markdown 代码块标记。';
    }

    function generateUserPrompt(industry, depth) {
        var depthDesc = {
            1: '轻量级：2-3个业务线，每业务线3-5张表，每表5-8个字段（含主键、外键、核心业务属性、时间字段），每表5-10条模拟数据，流程纯文字描述',
            2: '中等：4-5个业务线，每业务线5-10张表，每表8-12个字段（核心字段+常用业务字段如更新时间/操作人/备注），每表10-20条模拟数据，流程含Mermaid流程图',
            3: '深度建模：5-8个业务线，每业务线10-20张表，每表12-20个字段（核心+常用+扩展字段如审计/冗余/软删除/版本号），每表20-50条模拟数据，流程含完整Mermaid流程图和异常分支'
        };
        return '请为"' + industry + '"行业生成业务场景数据。\n探查深度：' + depth + '（' + (depthDesc[depth] || depthDesc[2]) + '）。\n\n' +
            '字段完整性要求：即使深度=1，每张表也必须包含支撑业务流程的核心字段（主键、必要外键、关键业务属性、状态/时间等），不可过于简陋。深度增加时逐步补充扩展字段。\n\n' +
            '重要：flowchart 字段必须是纯 Mermaid 语法文本，严禁包含 ```mermaid 或 ``` 等 Markdown 标记。\n' +
            '返回 JSON 格式，结构如下：\n' +
            '{"industry":"行业名","depth":数字,"generateTime":"YYYY-MM-DD HH:mm:ss","businessLines":[{"name":"业务线名","description":"描述","processes":[{"name":"流程名","description":"描述","flowchart":"graph TD\\nA[开始]-->B{判断}\\nB-->|是|C[结束]","tables":["表名数组"]}],"tables":[{"name":"表名","comment":"表注释","columns":[{"name":"字段名","type":"类型","comment":"注释","isPk":true/false}],"ddl":"完整CREATE TABLE语句","data":[每行是键值对对象]}],"relations":[{"from":"源表","to":"目标表","type":"1:1或1:N或N:1或M:N","field":"关联字段"}]}]}';
    }

    function cleanMermaid(text) {
        if (!text) return '';
        return text.replace(/^```mermaid\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '').trim();
    }

    var GENERATION_STEPS = [
        '正在连接 API 服务...',
        '正在生成业务线清单...',
        '正在生成业务流程和表结构...',
        '正在生成模拟数据...',
        '正在构建 ER 关系图...',
        '正在渲染页面...'
    ];

    function updateLoadingStep(index) {
        var container = document.getElementById('loading-steps');
        var html = '';
        GENERATION_STEPS.forEach(function(step, i) {
            var cls = 'loading-step';
            if (i < index) cls += ' done';
            else if (i === index) cls += ' active';
            html += '<div class="' + cls + '">' + (i < index ? '✓ ' : (i === index ? '⟳ ' : '○ ')) + step + '</div>';
        });
        container.innerHTML = html;
    }

    async function callApi(industry, depth) {
        var url = API_CONFIG.baseUrl.replace(/\/$/, '') + '/chat/completions';

        updateLoadingStep(0);

        var response;
        try {
            response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + API_CONFIG.apiKey
                },
                body: JSON.stringify({
                    model: API_CONFIG.model,
                    messages: [
                        { role: 'system', content: generateSystemPrompt() },
                        { role: 'user', content: generateUserPrompt(industry, depth) }
                    ],
                    response_format: { type: 'json_object' },
                    temperature: 0.7
                })
            });
        } catch(e) {
            if (e.message === 'Failed to fetch' || e.message.includes('NetworkError')) {
                throw new Error('网络请求失败，请检查：\n1. 网络连接是否正常\n2. API Key 是否有效\n3. 浏览器是否阻止了跨域请求（可尝试更换浏览器）');
            }
            throw e;
        }

        updateLoadingStep(1);

        if (!response.ok) {
            var errText = await response.text().catch(function() { return ''; });
            throw new Error('API 请求失败 (' + response.status + '): ' + errText);
        }

        updateLoadingStep(2);

        var result = await response.json();
        var content = result.choices && result.choices[0] && result.choices[0].message && result.choices[0].message.content;

        if (!content) {
            throw new Error('API 返回内容为空');
        }

        updateLoadingStep(3);

        // Try to extract JSON from markdown code blocks if present
        content = content.replace(/^```json\s*/i, '').replace(/\s*```$/, '').trim();

        try {
            return JSON.parse(content);
        } catch(e) {
            throw new Error('API 返回的 JSON 解析失败: ' + e.message);
        }
    }

    function onDataGenerated(data) {
        updateLoadingStep(4);
        BIZ_DATA = data;
        renderHeader();
        renderSidebar();
        selectBizLine(0, 0);
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: 'default' });
            setTimeout(function() {
                mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
            }, 100);
        }
        document.getElementById('header-info').style.display = 'flex';
        document.getElementById('generate-btn').textContent = '重新生成';
        updateLoadingStep(5);
        setTimeout(hideLoading, 500);
    }

    function init() {
        renderTabs();
        bindToggleAll();
        bindGenerate();
    }

    function bindGenerate() {
        document.getElementById('generate-btn').addEventListener('click', function() {
            var industry = document.getElementById('industry-input').value.trim();
            if (!industry) { alert('请输入行业名称'); return; }
            var depth = parseInt(document.getElementById('depth-select').value) || 2;

            showLoading('正在生成 ' + industry + ' 行业数据（深度' + depth + '）...');
            updateLoadingStep(0);

            callApi(industry, depth)
                .then(function(data) {
                    onDataGenerated(data);
                })
                .catch(function(err) {
                    showError(err.message);
                });
        });
    }

    function renderHeader() {
        document.getElementById('industry-input').value = BIZ_DATA.industry;
        document.getElementById('depth-select').value = BIZ_DATA.depth >= 3 ? '3' : String(BIZ_DATA.depth);
        document.getElementById('industry-display').textContent = '行业：' + BIZ_DATA.industry;
        var depthLabels = { 1: '轻量级(1)', 2: '中等(2)', 3: '深度建模(3)' };
        var label = depthLabels[BIZ_DATA.depth] || '深度建模(' + BIZ_DATA.depth + ')';
        document.getElementById('depth-display').textContent = '深度：' + label;
        document.getElementById('time-display').textContent = '生成：' + BIZ_DATA.generateTime;
    }

    function renderSidebar() {
        var nav = document.getElementById('biz-nav');
        var html = '';
        BIZ_DATA.businessLines.forEach(function(line, i) {
            html += '<div class="biz-line">';
            html += '<div class="biz-line-header" data-idx="' + i + '">';
            html += '<span>' + escapeHtml(line.name) + '</span><span class="arrow">▶</span>';
            html += '</div>';
            html += '<div class="process-list" id="processes-' + i + '">';
            line.processes.forEach(function(proc, j) {
                html += '<div class="process-item" id="proc-' + i + '-' + j + '" data-biz="' + i + '" data-proc="' + j + '">' + escapeHtml(proc.name) + '</div>';
            });
            html += '</div></div>';
        });
        nav.innerHTML = html;

        nav.querySelectorAll('.biz-line-header').forEach(function(header) {
            header.addEventListener('click', function() {
                var idx = parseInt(this.getAttribute('data-idx'));
                toggleBizLine(idx);
            });
        });

        nav.querySelectorAll('.process-item').forEach(function(item) {
            item.addEventListener('click', function() {
                var biz = parseInt(this.getAttribute('data-biz'));
                var proc = parseInt(this.getAttribute('data-proc'));
                selectBizLine(biz, proc);
            });
        });
    }

    function toggleBizLine(index) {
        var list = document.getElementById('processes-' + index);
        var header = list.previousElementSibling;
        list.classList.toggle('show');
        header.classList.toggle('expanded');
    }

    function bindToggleAll() {
        document.getElementById('toggle-all-btn').addEventListener('click', function() {
            allExpanded = !allExpanded;
            document.querySelectorAll('.process-list').forEach(function(list) {
                list.classList.toggle('show', allExpanded);
            });
            document.querySelectorAll('.biz-line-header').forEach(function(header) {
                header.classList.toggle('expanded', allExpanded);
            });
            this.textContent = allExpanded ? '全部收起' : '全部展开';
        });
    }

    function selectBizLine(bizIndex, procIndex) {
        currentBizLine = bizIndex;
        currentProcess = procIndex;
        document.querySelectorAll('.process-item').forEach(function(el) { el.classList.remove('active'); });
        var el = document.getElementById('proc-' + bizIndex + '-' + procIndex);
        if (el) el.classList.add('active');
        var line = BIZ_DATA.businessLines[bizIndex];
        var proc = line.processes[procIndex];
        renderProcessTab(proc);
        renderSchemaTab(line, proc);
        renderDataTab(line, proc);
        renderERTab();
    }

    function renderTabs() {
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
            });
        });
    }

    function renderProcessTab(proc) {
        var container = document.getElementById('tab-process');
        var html = '<div class="card"><h3>' + escapeHtml(proc.name) + '</h3>';
        html += '<p>' + escapeHtml(proc.description) + '</p></div>';
        if (proc.flowchart) {
            html += '<div class="card"><h3>流程图</h3>';
            html += '<div class="mermaid">' + cleanMermaid(proc.flowchart) + '</div></div>';
        }
        html += '<div class="card"><h3>涉及数据表</h3><ul>';
        proc.tables.forEach(function(t) { html += '<li>' + escapeHtml(t) + '</li>'; });
        html += '</ul></div>';
        container.innerHTML = html;
        if (typeof mermaid !== 'undefined') {
            setTimeout(function() {
                mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
            }, 100);
        }
    }

    function renderSchemaTab(line, proc) {
        var container = document.getElementById('tab-schema');
        var html = '';
        var tables = line.tables.filter(function(t) { return proc.tables.indexOf(t.name) !== -1; });
        tables.forEach(function(table) {
            html += '<div class="card"><h3>' + escapeHtml(table.name) + ' <span style="color:#8c8c8c;font-size:12px;font-weight:normal">' + escapeHtml(table.comment) + '</span></h3>';
            html += '<table><thead><tr><th>字段名</th><th>类型</th><th>说明</th></tr></thead><tbody>';
            table.columns.forEach(function(col) {
                html += '<tr><td>' + escapeHtml(col.name);
                if (col.isPk) html += ' <span class="pk-badge">PK</span>';
                html += '</td><td><span class="type-tag">' + escapeHtml(col.type) + '</span></td>';
                html += '<td>' + escapeHtml(col.comment) + '</td></tr>';
            });
            html += '</tbody></table>';
            html += '<div style="margin-top:12px"><div class="code-block"><button class="copy-btn">复制</button><pre><code class="language-sql">' + escapeHtml(table.ddl) + '</code></pre></div></div>';
            html += '</div>';
        });
        container.innerHTML = html;
        if (typeof hljs !== 'undefined') {
            container.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
        }
        container.querySelectorAll('.copy-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var code = this.nextElementSibling.querySelector('code').textContent;
                navigator.clipboard.writeText(code).then(function() {
                    var self = btn;
                    self.textContent = '已复制';
                    setTimeout(function() { self.textContent = '复制'; }, 1500);
                });
            });
        });
    }

    function renderDataTab(line, proc) {
        var container = document.getElementById('tab-data');
        var html = '';
        var tables = line.tables.filter(function(t) { return proc.tables.indexOf(t.name) !== -1; });
        tables.forEach(function(table) {
            html += '<div class="card"><h3>' + escapeHtml(table.name) + ' - 模拟数据 (' + table.data.length + ' 条)</h3>';
            if (table.data.length > 0) {
                html += '<div class="data-table-wrap"><table><thead><tr>';
                table.columns.forEach(function(col) { html += '<th>' + escapeHtml(col.name) + '</th>'; });
                html += '</tr></thead><tbody>';
                table.data.forEach(function(row) {
                    html += '<tr>';
                    table.columns.forEach(function(col) {
                        var val = row[col.name];
                        html += '<td>' + escapeHtml(String(val !== null && val !== undefined ? val : '')) + '</td>';
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                html += '<div style="margin-top:12px"><div class="code-block"><button class="copy-btn">复制</button><pre><code class="language-sql">' + escapeHtml(generateInserts(table)) + '</code></pre></div></div>';
            }
            html += '</div>';
        });
        container.innerHTML = html;
        if (typeof hljs !== 'undefined') {
            container.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
        }
        container.querySelectorAll('.copy-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var code = this.nextElementSibling.querySelector('code').textContent;
                navigator.clipboard.writeText(code).then(function() {
                    var self = btn;
                    self.textContent = '已复制';
                    setTimeout(function() { self.textContent = '复制'; }, 1500);
                });
            });
        });
    }

    function renderERTab() {
        var container = document.getElementById('tab-er');
        var line = BIZ_DATA.businessLines[currentBizLine];
        var html = '<div class="card"><h3>ER 关系图 — ' + escapeHtml(line.name) + '</h3>';

        var rels = line.relations || [];
        if (rels.length === 0) {
            html += '<p style="color:#8c8c8c;font-size:13px;">该业务板块暂无表间关联关系</p>';
        } else {
            html += '<div class="mermaid" id="er-mermaid">' + buildErMermaid(line) + '</div>';
            html += '<div style="margin-top:12px;font-size:12px;color:#8c8c8c;">';
            html += '<span style="margin-right:16px;">— 一对一 (1:1)</span>';
            html += '<span style="margin-right:16px;">⊣— 一对多 (1:N)</span>';
            html += '<span style="margin-right:16px;">—⊢ 多对多 (M:N)</span>';
            html += '<span>— 多对一 (N:1)</span>';
            html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html;

        if (typeof mermaid !== 'undefined') {
            setTimeout(function() {
                mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
            }, 100);
        }
        updateStats();
    }

    function buildErMermaid(line) {
        var rels = line.relations || [];
        if (rels.length === 0) return '';
        var s = 'erDiagram\n';
        var tableSet = {};
        line.tables.forEach(function(t) { tableSet[t.name] = true; });

        rels.forEach(function(rel) {
            var from = rel.from;
            var to = rel.to;
            var field = rel.field || '';
            var type = (rel.type || '1:N').toUpperCase();

            var leftCard, rightCard;
            switch (type) {
                case '1:1':  leftCard = '||'; rightCard = '||'; break;
                case '1:N':  leftCard = '||'; rightCard = '|{'; break;
                case 'N:1':  leftCard = '}|'; rightCard = '||'; break;
                case 'M:N':  leftCard = '}|'; rightCard = '|{'; break;
                default:     leftCard = '||'; rightCard = '|{';
            }

            var label = field ? ' "' + field + '"' : '';
            s += '    ' + from + ' ' + leftCard + '--' + rightCard + ' ' + to + ' :' + label + '\n';
        });
        return s;
    }

    function updateStats() {
        var tableCount = 0;
        BIZ_DATA.businessLines.forEach(function(line) { tableCount += line.tables.length; });
        document.getElementById('stats').textContent =
            '📦 共 ' + BIZ_DATA.businessLines.length + ' 个业务线 · ' + tableCount + ' 张表 · 深度：' + BIZ_DATA.depth + ' · 生成时间：' + BIZ_DATA.generateTime;
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function generateInserts(table) {
        if (!table.data || table.data.length === 0) return '-- 无数据';
        var sql = '';
        table.data.forEach(function(row) {
            var cols = table.columns.map(function(c) { return c.name; }).join(', ');
            var vals = table.columns.map(function(c) {
                var v = row[c.name];
                if (v === null || v === undefined) return 'NULL';
                if (typeof v === 'number') return v;
                return "'" + String(v).replace(/'/g, "''") + "'";
            }).join(', ');
            sql += 'INSERT INTO ' + table.name + ' (' + cols + ') VALUES (' + vals + ');\n';
        });
        return sql;
    }

    init();
})();
    </script>
</body>
</html>
