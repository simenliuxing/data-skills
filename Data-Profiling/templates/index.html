<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务场景模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #262626;
    height: 100vh;
    overflow: hidden;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    background: #fff;
    padding: 12px 24px;
    border-bottom: 1px solid #e8e8e8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.header h1 { font-size: 18px; font-weight: 600; }

.header-controls { display: flex; gap: 12px; align-items: center; }

.header-controls label { font-size: 13px; color: #595959; display: flex; align-items: center; gap: 6px; }

.header-controls input[type="text"] {
    padding: 6px 10px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    font-size: 13px;
    width: 140px;
}

.header-controls input[type="text"]:focus { border-color: #1890ff; outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }

.header-controls select {
    padding: 6px 10px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
}

.header-controls select:focus { border-color: #1890ff; outline: none; }

.btn {
    padding: 6px 16px;
    background: #fff;
    color: #595959;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}

.btn:hover { border-color: #1890ff; color: #1890ff; }
.btn:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; }

.btn-primary {
    background: #1890ff;
    color: #fff;
    border-color: #1890ff;
}

.btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }

.header-info { display: flex; gap: 16px; align-items: center; font-size: 13px; color: #8c8c8c; }

.btn {
    padding: 6px 16px;
    background: #1890ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}

.btn:hover { background: #40a9ff; }
.btn:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; }

.main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.sidebar {
    width: 240px;
    background: #001529;
    color: #fff;
    overflow-y: auto;
    flex-shrink: 0;
}

.sidebar-actions { padding: 8px; border-bottom: 1px solid #ffffff1a; }

.sidebar-action-btn {
    width: 100%;
    padding: 6px 12px;
    background: transparent;
    color: #ffffffbf;
    border: 1px solid #ffffff33;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.sidebar-action-btn:hover { background: #ffffff0d; color: #fff; }

.biz-line { border-bottom: 1px solid #ffffff1a; }

.biz-line-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
}

.biz-line-header:hover { background: #ffffff0d; }
.biz-line-header:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.biz-line-header .arrow { transition: transform 0.2s; font-size: 12px; }
.biz-line-header.expanded .arrow { transform: rotate(90deg); }

.process-list { display: none; }
.process-list.show { display: block; }

.process-item {
    padding: 8px 16px 8px 32px;
    cursor: pointer;
    font-size: 13px;
    color: #ffffffbf;
}

.process-item:hover { background: #ffffff0d; color: #fff; }
.process-item.active { background: #1890ff; color: #fff; }
.process-item:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f5f7fa;
}

.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 0 16px;
}

.tab-btn {
    padding: 12px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: #8c8c8c;
    border-bottom: 2px solid transparent;
}

.tab-btn:hover { color: #1890ff; }
.tab-btn.active { color: #1890ff; border-bottom-color: #1890ff; }
.tab-btn:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.tab-content { flex: 1; overflow-y: auto; padding: 16px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.card h3 { font-size: 15px; margin-bottom: 12px; color: #262626; }
.card p { font-size: 13px; line-height: 1.6; color: #595959; }

.card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.card th, .card td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #e8e8e8;
}

.card th { background: #fafafa; font-weight: 600; color: #262626; }
.card td { color: #595959; }

.code-block {
    position: relative;
    background: #f6f8fa;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
}

.copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.copy-btn:hover { border-color: #1890ff; color: #1890ff; }

.data-table-wrap {
    max-height: 400px;
    overflow: auto;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
}

.footer {
    background: #fff;
    padding: 8px 24px;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #8c8c8c;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mermaid { display: flex; justify-content: center; padding: 16px 0; }

.pk-badge {
    display: inline-block;
    padding: 1px 6px;
    background: #fff7e6;
    color: #fa8c16;
    border-radius: 3px;
    font-size: 11px;
    margin-left: 4px;
}

.type-tag {
    display: inline-block;
    padding: 1px 6px;
    background: #f0f5ff;
    color: #2f54eb;
    border-radius: 3px;
    font-size: 11px;
    font-family: monospace;
}
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>📊 业务场景模拟器</h1>
            <div class="header-controls">
                <label>行业：<input type="text" id="industry-input" placeholder="如：电商、金融、医疗" value=""></label>
                <label>深度：<select id="depth-select"><option value="1">1 - 轻量级</option><option value="2" selected>2 - 中等</option><option value="3">3 - 深度建模</option></select></label>
                <button id="generate-btn" class="btn btn-primary">▶ 生成</button>
            </div>
            <div class="header-info" id="header-info" style="display:none;">
                <span id="industry-display"></span>
                <span id="depth-display"></span>
                <span id="time-display"></span>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-actions">
                    <button class="sidebar-action-btn" id="toggle-all-btn" onclick="toggleAll()">全部展开</button>
                </div>
                <nav id="biz-nav"></nav>
            </aside>
            <main class="content">
                <div class="tabs" role="tablist">
                    <button id="tab-btn-process" class="tab-btn active" type="button" role="tab" aria-selected="true" data-tab="process">业务流程</button>
                    <button id="tab-btn-schema" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="schema">表结构</button>
                    <button id="tab-btn-data" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="data">模拟数据</button>
                    <button id="tab-btn-er" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="er">ER图</button>
                </div>
                <div class="tab-content">
                    <div id="tab-process" class="tab-pane active" role="tabpanel" aria-labelledby="tab-btn-process"></div>
                    <div id="tab-schema" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-schema"></div>
                    <div id="tab-data" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-data"></div>
                    <div id="tab-er" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-er"></div>
                </div>
            </main>
        </div>
        <footer class="footer">
            <span id="stats"></span>
        </footer>
    </div>

    <script>
        // 业务数据注入点 - Skill 执行时替换
        let BIZ_DATA = null; // BIZ_DATA_PLACEHOLDER — Skill 执行时替换为实际 JSON 数据
    </script>
    <script>
(function() {
    'use strict';

    const DEMO_DATA = {"industry":"电商","depth":2,"generateTime":"2026-05-08 15:00:00","businessLines":[{"name":"商品管理","description":"商品全生命周期管理，涵盖录入、审核、上下架、库存维护等核心环节","processes":[{"name":"商品录入与审核","description":"商家提交商品信息，平台进行资质与内容审核，通过后自动上架","flowchart":"graph LR\nA[商家提交] --> B{平台审核}\nB -->|通过| C[自动上架]\nB -->|驳回| D[修改重提]","tables":["dim_product","dwd_product_audit"]},{"name":"库存管理","description":"实时同步仓库库存，支持安全库存预警与盘点差异处理","flowchart":"graph LR\nA[入库/出库] --> B[更新库存]\nB --> C{低于阈值?}\nC -->|是| D[触发预警]\nC -->|否| E[正常]","tables":["dwd_inventory_log","dwd_stock_alert"]}],"tables":[{"name":"dim_product","comment":"商品维度表","columns":[{"name":"product_id","type":"BIGINT","comment":"商品ID","isPk":true},{"name":"product_name","type":"VARCHAR(256)","comment":"商品名称"},{"name":"category_id","type":"BIGINT","comment":"类目ID"},{"name":"brand_id","type":"BIGINT","comment":"品牌ID"},{"name":"price","type":"DECIMAL(10,2)","comment":"售价"},{"name":"status","type":"TINYINT","comment":"状态 0下架 1上架 2审核中"}],"ddl":"CREATE TABLE dim_product (\n  product_id BIGINT COMMENT '商品ID',\n  product_name VARCHAR(256) COMMENT '商品名称',\n  category_id BIGINT COMMENT '类目ID',\n  brand_id BIGINT COMMENT '品牌ID',\n  price DECIMAL(10,2) COMMENT '售价',\n  status TINYINT COMMENT '状态 0下架 1上架 2审核中'\n) COMMENT '商品维度表';","data":[{"product_id":1001,"product_name":"iPhone 15 Pro","category_id":101,"brand_id":201,"price":7999.00,"status":1},{"product_id":1002,"product_name":"MacBook Air M3","category_id":102,"brand_id":201,"price":8999.00,"status":1},{"product_id":1003,"product_name":"AirPods Pro 2","category_id":103,"brand_id":201,"price":1899.00,"status":0},{"product_id":1004,"product_name":"小米14 Ultra","category_id":101,"brand_id":202,"price":5999.00,"status":1},{"product_id":1005,"product_name":"Redmi K70","category_id":101,"brand_id":202,"price":2499.00,"status":2}]},{"name":"dwd_product_audit","comment":"商品审核事实表","columns":[{"name":"audit_id","type":"BIGINT","comment":"审核ID","isPk":true},{"name":"product_id","type":"BIGINT","comment":"商品ID"},{"name":"auditor_id","type":"BIGINT","comment":"审核人ID"},{"name":"audit_time","type":"DATETIME","comment":"审核时间"},{"name":"result","type":"TINYINT","comment":"结果 0驳回 1通过"},{"name":"remark","type":"VARCHAR(512)","comment":"审核意见"}],"ddl":"CREATE TABLE dwd_product_audit (\n  audit_id BIGINT COMMENT '审核ID',\n  product_id BIGINT COMMENT '商品ID',\n  auditor_id BIGINT COMMENT '审核人ID',\n  audit_time DATETIME COMMENT '审核时间',\n  result TINYINT COMMENT '结果 0驳回 1通过',\n  remark VARCHAR(512) COMMENT '审核意见'\n) COMMENT '商品审核事实表';","data":[{"audit_id":1,"product_id":1001,"auditor_id":301,"audit_time":"2026-05-01 10:00:00","result":1,"remark":"信息完整，予以通过"},{"audit_id":2,"product_id":1002,"auditor_id":302,"audit_time":"2026-05-01 11:30:00","result":1,"remark":"符合规范"},{"audit_id":3,"product_id":1003,"auditor_id":301,"audit_time":"2026-05-02 09:15:00","result":0,"remark":"主图不清晰，需重新上传"},{"audit_id":4,"product_id":1004,"auditor_id":303,"audit_time":"2026-05-02 14:00:00","result":1,"remark":"通过"},{"audit_id":5,"product_id":1005,"auditor_id":302,"audit_time":"2026-05-03 10:00:00","result":1,"remark":"通过"}]},{"name":"dwd_inventory_log","comment":"库存流水表","columns":[{"name":"log_id","type":"BIGINT","comment":"流水ID","isPk":true},{"name":"product_id","type":"BIGINT","comment":"商品ID"},{"name":"change_type","type":"TINYINT","comment":"变动类型 1入库 2出库 3盘点"},{"name":"change_qty","type":"INT","comment":"变动数量"},{"name":"balance_qty","type":"INT","comment":"变动后结余"},{"name":"operate_time","type":"DATETIME","comment":"操作时间"}],"ddl":"CREATE TABLE dwd_inventory_log (\n  log_id BIGINT COMMENT '流水ID',\n  product_id BIGINT COMMENT '商品ID',\n  change_type TINYINT COMMENT '变动类型 1入库 2出库 3盘点',\n  change_qty INT COMMENT '变动数量',\n  balance_qty INT COMMENT '变动后结余',\n  operate_time DATETIME COMMENT '操作时间'\n) COMMENT '库存流水表';","data":[{"log_id":1,"product_id":1001,"change_type":1,"change_qty":500,"balance_qty":500,"operate_time":"2026-05-01 08:00:00"},{"log_id":2,"product_id":1001,"change_type":2,"change_qty":120,"balance_qty":380,"operate_time":"2026-05-01 18:00:00"},{"log_id":3,"product_id":1002,"change_type":1,"change_qty":200,"balance_qty":200,"operate_time":"2026-05-01 08:00:00"},{"log_id":4,"product_id":1002,"change_type":2,"change_qty":45,"balance_qty":155,"operate_time":"2026-05-02 12:00:00"},{"log_id":5,"product_id":1003,"change_type":1,"change_qty":1000,"balance_qty":1000,"operate_time":"2026-05-01 08:00:00"}]},{"name":"dwd_stock_alert","comment":"库存预警表","columns":[{"name":"alert_id","type":"BIGINT","comment":"预警ID","isPk":true},{"name":"product_id","type":"BIGINT","comment":"商品ID"},{"name":"current_stock","type":"INT","comment":"当前库存"},{"name":"threshold","type":"INT","comment":"预警阈值"},{"name":"alert_time","type":"DATETIME","comment":"预警时间"},{"name":"status","type":"TINYINT","comment":"处理状态 0待处理 1已处理"}],"ddl":"CREATE TABLE dwd_stock_alert (\n  alert_id BIGINT COMMENT '预警ID',\n  product_id BIGINT COMMENT '商品ID',\n  current_stock INT COMMENT '当前库存',\n  threshold INT COMMENT '预警阈值',\n  alert_time DATETIME COMMENT '预警时间',\n  status TINYINT COMMENT '处理状态 0待处理 1已处理'\n) COMMENT '库存预警表';","data":[{"alert_id":1,"product_id":1002,"current_stock":155,"threshold":200,"alert_time":"2026-05-02 12:05:00","status":0},{"alert_id":2,"product_id":1004,"current_stock":80,"threshold":100,"alert_time":"2026-05-03 09:00:00","status":1}]}],"relations":[{"from":"dim_product","to":"dwd_product_audit","type":"1:N","field":"product_id"},{"from":"dim_product","to":"dwd_inventory_log","type":"1:N","field":"product_id"},{"from":"dim_product","to":"dwd_stock_alert","type":"1:N","field":"product_id"}]},{"name":"订单交易","description":"覆盖用户下单、支付、退款、结算等交易全链路","processes":[{"name":"下单与支付","description":"用户提交订单并完成支付，系统扣减库存并生成支付流水","flowchart":"graph LR\nA[提交订单] --> B[锁定库存]\nB --> C[发起支付]\nC --> D{支付成功?}\nD -->|是| E[扣减库存]\nD -->|否| F[释放库存]","tables":["dwd_order","dwd_order_item","dwd_payment_log"]},{"name":"售后退款","description":"用户申请退款，平台审核通过后原路退回资金并恢复库存","flowchart":"graph LR\nA[申请退款] --> B{审核通过 ld":"campaign_id"}]},{"name":"物流履约","description":"订单发货、运输轨迹跟踪、签收确认与异常处理","processes":[{"name":"发货与运输","description":"仓库拣货打包，交接物流公司，实时更新运输节点","flowchart":"graph LR\nA[订单支付] --> B[仓库拣货]\nB --> C[打包发货]\nC --> D[物流揽收]\nD --> E[运输中]\nE --> F[派送签收]","tables":["dwd_shipping_order","dwd_logistics_trace"]},{"name":"异常处理","description":"包裹丢失、破损、延误等异常上报与客诉处理","flowchart":"graph LR\nA[异常上报] --> B{类型判定}\nB -->|丢件| C[理赔流程]\nB -->|破损| D[补发流程]\nB -->|延误| E[催件流程]","tables":["dwd_logistics_exception"]}],"tables":[{"name":"dwd_shipping_order","comment":"发货单表","columns":[{"name":"ship_id","type":"BIGINT","comment":"发货单ID","isPk":true},{"name":"order_id","type":"BIGINT","comment":"订单ID"},{"name":"logistics_company","type":"VARCHAR(64)","comment":"物流公司"},{"name":"tracking_no","type":"VARCHAR(128)","comment":"运单号"},{"name":"ship_time","type":"DATETIME","comment":"发货时间"},{"name":"status","type":"TINYINT","comment":"状态 0待发货 1已发货 2已签收 3异常"}],"ddl":"CREATE TABLE dwd_shipping_order (\n  ship_id BIGINT COMMENT '发货单ID',\n  order_id BIGINT COMMENT '订单ID',\n  logistics_company VARCHAR(64) COMMENT '物流公司',\n  tracking_no VARCHAR(128) COMMENT '运单号',\n  ship_time DATETIME COMMENT '发货时间',\n  status TINYINT COMMENT '状态 0待发货 1已发货 2已签收 3异常'\n) COMMENT '发货单表';","data":[{"ship_id":1,"order_id":5001,"logistics_company":"顺丰速运","tracking_no":"SF1234567890","ship_time":"2026-05-01 14:00:00","status":2},{"ship_id":2,"order_id":5002,"logistics_company":"京东物流","tracking_no":"JD0987654321","ship_time":"2026-05-02 16:00:00","status":1},{"ship_id":3,"order_id":5005,"logistics_company":"中通快递","tracking_no":"ZT1122334455","ship_time":"2026-05-04 11:00:00","status":1}]},{"name":"dwd_logistics_trace","comment":"物流轨迹表","columns":[{"name":"trace_id","type":"BIGINT","comment":"轨迹ID","isPk":true},{"name":"tracking_no","type":"VARCHAR(128)","comment":"运单号"},{"name":"node_name","type":"VARCHAR(128)","comment":"节点名称"},{"name":"node_desc","type":"VARCHAR(256)","comment":"节点描述"},{"name":"trace_time","type":"DATETIME","comment":" istics_trace","type":"1:N","field":"tracking_no"},{"from":"dwd_shipping_order","to":"dwd_logistics_exception","type":"1:N","field":"tracking_no"}]}]};

    function loadDemoData() {
        BIZ_DATA = DEMO_DATA;
        renderHeader();
        renderSidebar();
        selectBizLine(0, 0);
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: 'default' });
            mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
        }
        document.getElementById('header-info').style.display = 'flex';
        document.getElementById('industry-input').disabled = true;
        document.getElementById('depth-select').disabled = true;
        document.getElementById('generate-btn').textContent = '已生成';
        document.getElementById('generate-btn').disabled = true;
    }

    function init() {
        renderTabs();
        if (BIZ_DATA) {
            loadDemoData();
        }
    }

    function renderHeader() {
        document.getElementById('industry-input').value = BIZ_DATA.industry;
        document.getElementById('depth-select').value = BIZ_DATA.depth >= 3 ? '3' : String(BIZ_DATA.depth);
        document.getElementById('industry-display').textContent = '行业：' + BIZ_DATA.industry;
        const depthLabels = { 1: '轻量级', 2: '中等', default: '深度建模' };
        document.getElementById('depth-display').textContent = '深度：' + (depthLabels[BIZ_DATA.depth] || depthLabels.default) + '(' + BIZ_DATA.depth + ')';
        document.getElementById('time-display').textContent = '生成：' + BIZ_DATA.generateTime;
    }

    function renderSidebar() {
        const nav = document.getElementById('biz-nav');
        let html = '';
        BIZ_DATA.businessLines.forEach((line, i) => {
            html += '<div class="biz-line">';
            html += '<div class="biz-line-header" onclick="toggleBizLine(' + i + ')">';
            html += '<span>' + line.name + '</span><span class="arrow">▶</span>';
            html += '</div>';
            html += '<div class="process-list" id="processes-' + i + '">';
            line.processes.forEach((proc, j) => {
                html += '<div class="process-item" id="proc-' + i + '-' + j + '" onclick="selectProcess(' + i + ',' + j + ')">' + proc.name + '</div>';
            });
            html += '</div></div>';
        });
        nav.innerHTML = html;
    }

    function toggleBizLine(index) {
        const list = document.getElementById('processes-' + index);
        const header = list.previousElementSibling;
        list.classList.toggle('show');
        header.classList.toggle('expanded');
    }

    let allExpanded = false;
    function toggleAll() {
        allExpanded = !allExpanded;
        document.querySelectorAll('.process-list').forEach(list => {
            list.classList.toggle('show', allExpanded);
        });
        document.querySelectorAll('.biz-line-header').forEach(header => {
            header.classList.toggle('expanded', allExpanded);
        });
        document.getElementById('toggle-all-btn').textContent = allExpanded ? '全部收起' : '全部展开';
    }

    function selectBizLine(bizIndex, procIndex) {
        currentBizLine = bizIndex;
        currentProcess = procIndex;
        document.querySelectorAll('.process-item').forEach(el => el.classList.remove('active'));
        const el = document.getElementById('proc-' + bizIndex + '-' + procIndex);
        if (el) el.classList.add('active');
        const line = BIZ_DATA.businessLines[bizIndex];
        const proc = line.processes[procIndex];
        renderProcessTab(proc);
        renderSchemaTab(line, proc);
        renderDataTab(line, proc);
        renderERTab();
    }

    function selectProcess(bizIndex, procIndex) {
        selectBizLine(bizIndex, procIndex);
    }

    function renderTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });
    }

    function renderProcessTab(proc) {
        const container = document.getElementById('tab-process');
        let html = '<div class="card"><h3>' + proc.name + '</h3>';
        html += '<p>' + proc.description + '</p></div>';
        if (proc.flowchart) {
            html += '<div class="card"><h3>流程图</h3>';
            html += '<div class="mermaid">' + proc.flowchart + '</div></div>';
        }
        html += '<div class="card"><h3>涉及数据表</h3><ul>';
        proc.tables.forEach(t => { html += '<li>' + t + '</li>'; });
        html += '</ul></div>';
        container.innerHTML = html;
        if (typeof mermaid !== 'undefined') {
            mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
        }
    }

    function renderSchemaTab(line, proc) {
        const container = document.getElementById('tab-schema');
        let html = '';
        const tables = line.tables.filter(t => proc.tables.includes(t.name));
        tables.forEach(table => {
            html += '<div class="card"><h3>' + table.name + ' <span style="color:#8c8c8c;font-size:12px;font-weight:normal">' + table.comment + '</span></h3>';
            html += '<table><thead><tr><th>字段名</th><th>类型</th><th>说明</th></tr></thead><tbody>';
            table.columns.forEach(col => {
                html += '<tr><td>' + col.name;
                if (col.isPk) html += ' <span class="pk-badge">PK</span>';
                html += '</td><td><span class="type-tag">' + col.type + '</span></td>';
                html += '<td>' + col.comment + '</td></tr>';
            });
            html += '</tbody></table>';
            html += '<div style="margin-top:12px"><div class="code-block"><button class="copy-btn" onclick="copyDDL(this)">复制</button><pre><code class="language-sql">' + escapeHtml(table.ddl) + '</code></pre></div></div>';
            html += '</div>';
        });
        container.innerHTML = html;
        if (typeof hljs !== 'undefined') {
            container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }
    }

    function renderDataTab(line, proc) {
        const container = document.getElementById('tab-data');
        let html = '';
        const tables = line.tables.filter(t => proc.tables.includes(t.name));
        tables.forEach(table => {
            html += '<div class="card"><h3>' + table.name + ' - 模拟数据 (' + table.data.length + ' 条)</h3>';
            if (table.data.length > 0) {
                html += '<div class="data-table-wrap"><table><thead><tr>';
                table.columns.forEach(col => { html += '<th>' + col.name + '</th>'; });
                html += '</tr></thead><tbody>';
                table.data.forEach(row => {
                    html += '<tr>';
                    table.columns.forEach(col => { html += '<td>' + escapeHtml(String(row[col.name] ?? '')) + '</td>'; });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                html += '<div style="margin-top:12px"><div class="code-block"><button class="copy-btn" onclick="copySQL(this)">复制</button><pre><code class="language-sql">' + generateInserts(table) + '</code></pre></div></div>';
            }
            html += '</div>';
        });
        container.innerHTML = html;
        if (typeof hljs !== 'undefined') {
            container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }
    }

    function renderERTab() {
        const container = document.getElementById('tab-er');
        let erDiagram = 'erDiagram\n';
        BIZ_DATA.businessLines.forEach(line => {
            if (line.relations) {
                line.relations.forEach(rel => {
                    const connector = rel.type === '1:1' ? '||--||' : rel.type === 'N:N' ? '}o--o{' : '||--o{';
                    erDiagram += '    ' + rel.from + ' ' + connector + ' ' + rel.to + ' : "' + rel.field + '"\n';
                });
            }
        });
        container.innerHTML = '<div class="card"><h3>ER 关系图</h3><div class="mermaid">' + erDiagram + '</div></div>';
        if (typeof mermaid !== 'undefined') {
            mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
        }
        updateStats();
    }

    function updateStats() {
        let tableCount = 0;
        BIZ_DATA.businessLines.forEach(line => { tableCount += line.tables.length; });
        document.getElementById('stats').textContent =
            '📦 共 ' + BIZ_DATA.businessLines.length + ' 个业务线 · ' + tableCount + ' 张表 · 深度：' + BIZ_DATA.depth + ' · 生成时间：' + BIZ_DATA.generateTime;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function generateInserts(table) {
        if (!table.data || table.data.length === 0) return '-- 无数据';
        let sql = '';
        table.data.forEach(row => {
            const cols = table.columns.map(c => c.name).join(', ');
            const vals = table.columns.map(c => {
                const v = row[c.name];
                if (v === null || v === undefined) return 'NULL';
                if (typeof v === 'number') return v;
                return "'" + String(v).replace(/'/g, "''") + "'";
            }).join(', ');
            sql += 'INSERT INTO ' + table.name + ' (' + cols + ') VALUES (' + vals + ');\n';
        });
        return sql;
    }

    window.toggleBizLine = toggleBizLine;
    window.selectProcess = selectProcess;

    window.copyDDL = function(btn) {
        const code = btn.nextElementSibling.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制'; setTimeout(() => { btn.textContent = '复制'; }, 1500); });
    };

    window.copySQL = function(btn) {
        const code = btn.nextElementSibling.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制'; setTimeout(() => { btn.textContent = '复制'; }, 1500); });
    };

    document.getElementById('generate-btn').addEventListener('click', function() {
        var industry = document.getElementById('industry-input').value.trim();
        if (!industry) { alert('请输入行业名称'); return; }
        loadDemoData();
    });



    init();
})();
    </script>
</body>
