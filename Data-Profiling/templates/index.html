<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务场景模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #262626;
    height: 100vh;
    overflow: hidden;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    background: #fff;
    padding: 12px 24px;
    border-bottom: 1px solid #e8e8e8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h1 { font-size: 18px; font-weight: 600; }

.header-info { display: flex; gap: 16px; align-items: center; font-size: 13px; color: #8c8c8c; }

.btn {
    padding: 6px 16px;
    background: #1890ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}

.btn:hover { background: #40a9ff; }
.btn:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; }

.main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

.sidebar {
    width: 240px;
    background: #001529;
    color: #fff;
    overflow-y: auto;
    flex-shrink: 0;
}

.biz-line { border-bottom: 1px solid #ffffff1a; }

.biz-line-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
}

.biz-line-header:hover { background: #ffffff0d; }
.biz-line-header:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.biz-line-header .arrow { transition: transform 0.2s; font-size: 12px; }
.biz-line-header.expanded .arrow { transform: rotate(90deg); }

.process-list { display: none; }
.process-list.show { display: block; }

.process-item {
    padding: 8px 16px 8px 32px;
    cursor: pointer;
    font-size: 13px;
    color: #ffffffbf;
}

.process-item:hover { background: #ffffff0d; color: #fff; }
.process-item.active { background: #1890ff; color: #fff; }
.process-item:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f5f7fa;
}

.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 0 16px;
}

.tab-btn {
    padding: 12px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: #8c8c8c;
    border-bottom: 2px solid transparent;
}

.tab-btn:hover { color: #1890ff; }
.tab-btn.active { color: #1890ff; border-bottom-color: #1890ff; }
.tab-btn:focus-visible { outline: 2px solid #1890ff; outline-offset: -2px; }

.tab-content { flex: 1; overflow-y: auto; padding: 16px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.card h3 { font-size: 15px; margin-bottom: 12px; color: #262626; }
.card p { font-size: 13px; line-height: 1.6; color: #595959; }

.card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.card th, .card td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #e8e8e8;
}

.card th { background: #fafafa; font-weight: 600; color: #262626; }
.card td { color: #595959; }

.code-block {
    position: relative;
    background: #f6f8fa;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
}

.copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 8px;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.copy-btn:hover { border-color: #1890ff; color: #1890ff; }

.data-table-wrap {
    max-height: 400px;
    overflow: auto;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
}

.footer {
    background: #fff;
    padding: 8px 24px;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #8c8c8c;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.mermaid { display: flex; justify-content: center; padding: 16px 0; }

.pk-badge {
    display: inline-block;
    padding: 1px 6px;
    background: #fff7e6;
    color: #fa8c16;
    border-radius: 3px;
    font-size: 11px;
    margin-left: 4px;
}

.type-tag {
    display: inline-block;
    padding: 1px 6px;
    background: #f0f5ff;
    color: #2f54eb;
    border-radius: 3px;
    font-size: 11px;
    font-family: monospace;
}
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>📊 业务场景模拟器</h1>
            <div class="header-info">
                <span id="industry-display"></span>
                <span id="depth-display"></span>
                <span id="time-display"></span>
                <button id="export-btn" class="btn">导出 HTML</button>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar">
                <nav id="biz-nav"></nav>
            </aside>
            <main class="content">
                <div class="tabs" role="tablist">
                    <button id="tab-btn-process" class="tab-btn active" type="button" role="tab" aria-selected="true" data-tab="process">业务流程</button>
                    <button id="tab-btn-schema" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="schema">表结构</button>
                    <button id="tab-btn-data" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="data">模拟数据</button>
                    <button id="tab-btn-er" class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="er">ER图</button>
                </div>
                <div class="tab-content">
                    <div id="tab-process" class="tab-pane active" role="tabpanel" aria-labelledby="tab-btn-process"></div>
                    <div id="tab-schema" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-schema"></div>
                    <div id="tab-data" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-data"></div>
                    <div id="tab-er" class="tab-pane" role="tabpanel" aria-labelledby="tab-btn-er"></div>
                </div>
            </main>
        </div>
        <footer class="footer">
            <span id="stats"></span>
        </footer>
    </div>

    <script>
        // 业务数据注入点 - Skill 执行时替换
        const BIZ_DATA = null; // BIZ_DATA_PLACEHOLDER — Skill 执行时替换为实际 JSON 数据
    </script>
    <script>

    </script>
</body>
</html>
